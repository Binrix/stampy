version: '3.1'

services:
  redis:
    image: "redis:alpine"
    ports:
      - "6379:6379"
    expose:
      - 6379

  stampy-db:
    build: stampy-db
    volumes:
      - "./stampy-db/data:/var/lib/postgresql/data"
    ports:
      - "5432:5432"
    expose:
      - 5432
    restart: "no"
    environment:
      - POSTGRES_PASSWORD=CHANGEME